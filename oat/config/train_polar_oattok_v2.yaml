defaults:
  - _self_
  - task/tokenizer: libero/libero10

name: train_polar_oattok_v2
_target_: oat.workspace.train_polar_oattok_v2.TrainPolarOATTokV2Workspace

seed: 42
horizon: 32
task_name: ${task.tokenizer.name}
action_dim: ${task.tokenizer.shape_meta.action.shape[0]}

tokenizer:
  _target_: oat.tokenizer.polar_v2.tokenizer.PolarOATTokV2

  polar_decompose:
    _target_: oat.tokenizer.polar.polar_decompose.PolarDecompose

  inv_encoder:
    _target_: oat.tokenizer.oat.encoder.register_encoder.RegisterEncoder
    sample_dim: 4                # (r_trans, dz, r_rot, grip)
    sample_horizon: ${horizon}
    emb_dim: 256
    head_dim: 64
    depth: 2
    pdropout: 0.1
    latent_dim: 4                # = len(FSQ levels)
    num_registers: 8             # temporal compression: 32 -> 8

  eq_encoder:
    _target_: oat.tokenizer.oat.encoder.register_encoder.RegisterEncoder
    sample_dim: 3                # (theta_trans, theta_rot, dyaw)
    sample_horizon: ${horizon}
    emb_dim: 256
    head_dim: 64
    depth: 2
    pdropout: 0.1
    latent_dim: 3                # = len(CyclicVQ n_bins)
    num_registers: 8             # must match inv_encoder

  inv_quantizer:
    _target_: oat.tokenizer.oat.quantizer.fsq.FSQ
    levels: [8, 5, 5, 5]        # vocab = 1000 (same as original OATTok)

  eq_quantizer:
    _target_: oat.tokenizer.polar_v2.cyclic_vq_product.CyclicVQProduct
    n_bins: [24, 12, 8]         # vocab = 24*12*8 = 2304

  decoder:
    _target_: oat.tokenizer.oat.decoder.single_pass_decoder.SinglePassDecoder
    sample_dim: ${action_dim}    # 7
    sample_horizon: ${horizon}   # 32
    emb_dim: 256
    head_dim: 64
    depth: 4
    pdropout: 0.1
    token_dropout_mode: 'pow2'
    latent_dim: 7                # inv(4) + eq(3) concatenated
    latent_horizon: 8            # = num_registers
    use_causal_decoder: true

  equiv_reg_weight: 0.1         # lambda for soft equivariance regularization
  n_equiv_samples: 4            # random rotations per batch

training:
  resume: True
  allow_bf16: True
  max_grad_norm: 1.0
  num_epochs: 5001
  checkpoint_every: 10
  val_every: 10
  sample_every: 10
  lr_scheduler: constant
  lr_warmup_steps: 100
  gradient_accumulate_every: 1
  max_train_steps: null
  max_val_steps: null
  max_reconst_steps: null
  seed: ${seed}
  use_ema: True
  num_demo: 500
  tqdm_interval_sec: 1.0

ema:
  _target_: oat.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

optimizer:
  learning_rate: 5.0e-5
  weight_decay: 0.0
  betas: [0.9, 0.95]

dataloader:
  batch_size: 256
  num_workers: 4
  shuffle: True
  pin_memory: True
  persistent_workers: True
  drop_last: True

val_dataloader:
  batch_size: 256
  num_workers: 4
  shuffle: False
  pin_memory: True
  persistent_workers: True
  drop_last: True

logging:
  project: oat_dev
  resume: True
  mode: online
  name: ${now:%Y%m%d.%H%M%S}_${name}_${task_name}_N${training.num_demo}
  tags: ["${name}", "${task_name}"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: test_reconst_mse
    mode: min
    k: 3
    format_str: 'ep-{epoch:04d}_mse-{test_reconst_mse:.3f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: output/${now:%Y%m%d}/${now:%H%M%S}_${name}_${task_name}_N${training.num_demo}
  wandb_name_base: ${now:%Y%m%d.%H%M%S}_${name}_${task_name}_N${training.num_demo}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: output/${now:%Y%m%d}/${now:%H%M%S}_${name}_${task_name}_N${training.num_demo}
  sweep:
    dir: output/${now:%Y%m%d}/${now:%H%M%S}_${name}_${task_name}_N${training.num_demo}
    subdir: ${hydra.job.num}
