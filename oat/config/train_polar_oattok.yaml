defaults:
  - _self_
  - task/tokenizer: libero/libero10

name: train_polar_oattok
_target_: oat.workspace.train_oattok.TrainOATTokWorkspace

seed: 42
horizon: 32
task_name: ${task.tokenizer.name}
action_dim: ${task.tokenizer.shape_meta.action.shape[0]}

tokenizer:
  _target_: oat.tokenizer.polar.tokenizer.PolarOATTok

  # Invariant subspace (FSQ)
  # fsq_levels: [8, 10, 4, 3]   # r_trans, dz, r_rot, grip -> vocab=960
  fsq_levels: [8, 5, 5, 5]   # original oattok
  inv_encoder_hidden: 128
  inv_encoder_layers: 2

  # Equivariant subspace (CyclicVQ, fixed bins, no encoder)
  n_bins_trans: 24    # theta_trans: 15deg resolution
  n_bins_rot: 12      # theta_rot: 30deg resolution
  # n_bins_yaw: 16      # dyaw: ~22.5deg resolution
  n_bins_yaw: 8      # dyaw: 30deg resolution

  # Decoder
  decoder_hidden: 256
  decoder_layers: 2
  embed_dim: 32       # per-token embedding dim

  # Action chunk
  sample_horizon: ${horizon}

training:
  resume: True
  allow_bf16: True
  max_grad_norm: 1.0
  num_epochs: 5001
  checkpoint_every: 10
  val_every: 10
  sample_every: 10
  lr_scheduler: constant
  lr_warmup_steps: 100
  gradient_accumulate_every: 1
  max_train_steps: null
  max_val_steps: null
  max_reconst_steps: null
  seed: ${seed}
  use_ema: True
  num_demo: 500
  tqdm_interval_sec: 1.0

ema:
  _target_: oat.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

optimizer:
  learning_rate: 5.0e-5
  weight_decay: 0.0
  betas: [0.9, 0.95]

dataloader:
  batch_size: 256
  num_workers: 4
  shuffle: True
  pin_memory: True
  persistent_workers: True
  drop_last: True

val_dataloader:
  batch_size: 256
  num_workers: 4
  shuffle: False
  pin_memory: True
  persistent_workers: True
  drop_last: True

logging:
  project: oat_dev
  resume: True
  mode: online
  name: ${now:%Y%m%d.%H%M%S}_${name}_${task_name}_N${training.num_demo}
  tags: ["${name}", "${task_name}"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: test_reconst_mse
    mode: min
    k: 3
    format_str: 'ep-{epoch:04d}_mse-{test_reconst_mse:.3f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: output/${now:%Y%m%d}/${now:%H%M%S}_${name}_${task_name}_N${training.num_demo}
  wandb_name_base: ${now:%Y%m%d.%H%M%S}_${name}_${task_name}_N${training.num_demo}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: output/${now:%Y%m%d}/${now:%H%M%S}_${name}_${task_name}_N${training.num_demo}
  sweep:
    dir: output/${now:%Y%m%d}/${now:%H%M%S}_${name}_${task_name}_N${training.num_demo}
    subdir: ${hydra.job.num}
