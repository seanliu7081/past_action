# train_oattok_bsq.yaml
# ─────────────────────────────────────────────────────
# OATTok with BSQ quantizer (L=10, codebook=1024)
# Drop-in replacement: only quantizer and latent_dim changed.
# Everything else identical to train_oattok.yaml.
# ─────────────────────────────────────────────────────

defaults:
  - _self_
  - task/tokenizer: libero/libero10

name: train_oattok_bsq_L10
_target_: oat.workspace.train_oattok.TrainOATTokWorkspace

seed: 42
horizon: 32
task_name: ${task.tokenizer.name}
action_dim: ${task.tokenizer.shape_meta.action.shape[0]}

# ── KEY CHANGE: latent_dim = L (not len(levels)) ────
latent_dim: 10

tokenizer: 
  _target_: oat.tokenizer.oat.tokenizer.OATTok

  encoder:
    _target_: oat.tokenizer.oat.encoder.register_encoder.RegisterEncoder
    sample_dim: ${action_dim}
    sample_horizon: ${horizon}
    emb_dim: 256
    head_dim: 64
    depth: 2
    pdropout: 0.1
    latent_dim: ${latent_dim}     # 10 (was 4)
    num_registers: 8
    
  decoder:
    _target_: oat.tokenizer.oat.decoder.single_pass_decoder.SinglePassDecoder
    sample_dim: ${action_dim}
    sample_horizon: ${horizon}
    emb_dim: 256
    head_dim: 64
    depth: 4
    pdropout: 0.1
    token_dropout_mode: 'pow2'
    latent_dim: ${latent_dim}     # 10 (was 4)
    latent_horizon: ${tokenizer.encoder.num_registers}
    use_causal_decoder: true

  # ── KEY CHANGE: BSQ instead of FSQ ─────────────────
  quantizer:
    _target_: oat.tokenizer.oat.quantizer.bsq.BSQ
    L: ${latent_dim}              # 10 → codebook = 2^10 = 1024

training:
  resume: True
  allow_bf16: True
  max_grad_norm: 1.0
  num_epochs: 5001
  checkpoint_every: 10
  val_every: 10
  sample_every: 10
  lr_scheduler: constant
  lr_warmup_steps: 100
  gradient_accumulate_every: 1
  max_train_steps: null
  max_val_steps: null
  max_reconst_steps: null
  seed: ${seed}
  use_ema: True
  num_demo: 500
  tqdm_interval_sec: 1.0

ema:
  _target_: oat.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

optimizer:
  learning_rate: 5.0e-5
  weight_decay: 0.0
  betas: [0.9, 0.95]
  
dataloader:
  batch_size: 256
  num_workers: 4
  shuffle: True
  pin_memory: True
  persistent_workers: True
  drop_last: True

val_dataloader:
  batch_size: 256
  num_workers: 4
  shuffle: False
  pin_memory: True
  persistent_workers: True
  drop_last: True

logging:
  project: oat_dev
  resume: True
  mode: online
  name: ${now:%Y%m%d.%H%M%S}_${name}_${task_name}_N${training.num_demo}
  tags: ["${name}", "${task_name}", "bsq"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: test_reconst_mse
    mode: min
    k: 3
    format_str: 'ep-{epoch:04d}_mse-{test_reconst_mse:.3f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: output/${now:%Y%m%d}/${now:%H%M%S}_${name}_${task_name}_N${training.num_demo}
  wandb_name_base: ${now:%Y%m%d.%H%M%S}_${name}_${task_name}_N${training.num_demo}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: output/${now:%Y%m%d}/${now:%H%M%S}_${name}_${task_name}_N${training.num_demo}
  sweep:
    dir: output/${now:%Y%m%d}/${now:%H%M%S}_${name}_${task_name}_N${training.num_demo}
    subdir: ${hydra.job.num}